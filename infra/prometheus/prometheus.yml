global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /actuator/prometheus

  - job_name: job-orchestrator
    static_configs:
      - targets: ["job-orchestrator:8081"]
    metrics_path: /actuator/prometheus

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8082"]
    metrics_path: /actuator/prometheus

  - job_name: ai-render-worker
    static_configs:
      - targets: ["ai-render-worker:8083"]
    metrics_path: /metrics
