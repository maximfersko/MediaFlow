version: "3.9"

x-healthcheck-defaults: &hc
  interval: 10s
  timeout: 5s
  retries: 15
  start_period: 60s

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_PROPAGATORS: tracecontext,baggage
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "1.0"

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediaflow
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: mediaflow,keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      <<: *hc
      test: ["CMD", "redis-cli", "ping"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      <<: *hc
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic media.generation.requests --partitions 12 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic media.generation.events   --partitions 12 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic media.dlq.requests        --partitions 3  --replication-factor 1
      "
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: "info"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      <<: *hc
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./vault/init-secrets.sh:/init-secrets.sh
    command: sh /init-secrets.sh
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    ports:
      - "8180:8180"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  db-migrator:
    image: liquibase/liquibase:4.28
    command: >
      --url=jdbc:postgresql://postgres:5432/mediaflow
      --changelog-file=changelog/db.changelog-master.yaml
      --username=${DB_USER}
      --password=${DB_PASSWORD}
      update
    volumes:
      - ../migrations:/liquibase/changelog/migrations
      - ../job-orchestrator/src/main/resources/db/changelog:/liquibase/changelog
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: api-gateway
      JAVA_TOOL_OPTIONS: ""
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    depends_on:
      vault-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy

  job-orchestrator:
    build:
      context: ..
      dockerfile: job-orchestrator/Dockerfile
    ports:
      - "8081:8081"
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: job-orchestrator
      JAVA_TOOL_OPTIONS: ""
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault:8200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully

  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: notification-service
      JAVA_TOOL_OPTIONS: ""
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDR: http://vault:8200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  ai-render-worker:
    build:
      context: ../ai-render-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: ai-render-worker
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    deploy:
      replicas: 2

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
    command: -config.file=/etc/tempo.yaml

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres_data:
  minio_data:
